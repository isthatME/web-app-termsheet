<section class="deals-page">
  <app-deals-page-header (logoutClicked)="logout()" />

  <section class="card">
    <h2>Add Deal</h2>
    <app-deals-add-form
      [form]="addDealForm"
      [capRatePreview]="(capRatePreview$ | async) ?? 0"
      [isCapRateTypical]="(isCapRateTypical$ | async) ?? true"
      (submitDeal)="addDeal()"
    />
  </section>

  <section class="card">
    <h2>Filters</h2>
    <app-deals-filters
      [nameFilter]="nameFilterValue$.value"
      [priceOperator]="priceOperatorValue$.value"
      [priceFilter]="priceFilterValue$.value"
      (nameFilterChange)="nameFilterValue$.next($event)"
      (priceOperatorChange)="priceOperatorValue$.next($event)"
      (priceFilterChange)="priceFilterValue$.next($event)"
    />
  </section>

  <section class="card">
    <h2>Deal Listing</h2>
    <app-deals-table [deals]="filteredDeals$ | async" />
  </section>
</section>
